# =============================================================================
# candle_ingest_config.yaml
#
# Configuration for the candle ingestion script.
# Edit this to control which exchanges, trading pairs, and intervals are
# pulled into MongoDB for Quants Lab backtesting and Optuna optimization.
#
# Location: /mnt/sharedrive/apps/hummingbot/bootstrap/candle_ingest_config.yaml
# =============================================================================

# How many days of history to backfill on the FIRST run for each pair.
# Subsequent runs are incremental (only fetch new candles since last known).
backfill_days: 180

exchanges:

  # ── NonKYC.io (your primary exchange) ───────────────────────────────────
  # Available resolutions: 5m, 15m, 30m, 1h, 3h, 4h, 8h, 12h, 1d
  # Pairs use slash format internally but are stored as BTC-USDT in MongoDB.
  nonkyc:
    enabled: true
    pairs:
      - BTC/USDT
      - ETH/USDT
      - SOL/USDT
      - DOGE/USDT
      - SAL/USDT
      - XMR/USDT
      - EPIC/XMR
      - XTM/XMR
      - ARRR/XMR
      - XNV/XMR
      - ZEC/XMR
      - XMR/BTC
      - LTC/XMR
      - GHOST/XMR
      - FUSD/XMR
      - ERG/XMR
      - XMR/ZSD
      - VEIL/XMR
      - ALIAS/XMR
      - XKR/XMR
    intervals:
      - 5m
      - 15m
      - 1h
      - 4h
      - 1d

  # ── Binance (high-volume reference data) ────────────────────────────────
  # Use Binance candles as indicator signals for NonKYC trading.
  # The PMM Dynamic controller supports candles_connector != connector_name.
  binance:
    enabled: false
    pairs:
      - BTC/USDT
      - ETH/USDT
      - SOL/USDT
      - DOGE/USDT
      - XMR/USDT
      - XMR/USDC
    intervals:
      - 1m
      - 5m
      - 15m
      - 1h
      - 4h
      - 1d

  # ── MEXC (mid-volume comparison) ────────────────────────────────────────
  # Useful to compare optimal parameters against a different volume profile.
  mexc:
    enabled: true
    pairs:
      - BTC/USDT
      - ETH/USDT
      - SOL/USDT
      - DOGE/USDT
      - XMR/USDT
      - XMR/USDC
      - SAL/USDT
    intervals:
      - 1m
      - 5m
      - 15m
      - 1h
      - 4h
      - 1d
